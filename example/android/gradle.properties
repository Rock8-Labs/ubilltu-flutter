org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Kotlin incremental compilation uses memory-mapped cache files that can fail on
# some filesystems ("Could not close incremental caches"), e.g. network/mapped
# drives. Disabling it makes plugin Kotlin (e.g. url_launcher_android) build
# reliably; full (non-incremental) compilation is unaffected.
kotlin.incremental=false
